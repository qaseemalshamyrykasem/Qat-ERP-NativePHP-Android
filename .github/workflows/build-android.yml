name: Build Android App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (release or bundle)'
        required: false
        default: 'bundle'
        type: choice
        options:
          - bundle
          - release
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: false
        default: ''

jobs:
  build-android:
    name: Build Android APK/AAB
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    env:
      APP_ENV: production
      APP_DEBUG: false
      NATIVEPHP_APP_ID: com.qaterp.qat
      NATIVEPHP_APP_NAME: "Qat ERP"
      NATIVEPHP_START_URL: /login
      NATIVEPHP_RUNTIME_MODE: persistent
      NATIVEPHP_ANDROID_MIN_SDK: 26
      NATIVEPHP_ANDROID_COMPILE_SDK: 35
      NATIVEPHP_ANDROID_TARGET_SDK: 35
      DB_CONNECTION: sqlite

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, sqlite3, pdo_sqlite
          tools: composer:v2
          coverage: none
- name: Prepare Laravel directories
  run: |
    mkdir -p bootstrap/cache
    mkdir -p storage/framework/cache/data
    mkdir -p storage/framework/sessions
    mkdir -p storage/framework/views
    mkdir -p storage/framework/testing
    mkdir -p storage/logs
    touch storage/logs/laravel.log

      - name: Cache Composer dependencies
        id: composer-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php83-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php83-composer-
- name: Install Composer dependencies
  run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup application environment
        run: |
          cp .env.example .env
          php artisan key:generate --force
          touch database/database.sqlite

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk
            ~/.android/build-cache
          key: ${{ runner.os }}-android-sdk-${{ hashFiles('nativephp/android/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NativePHP for Android
        run: php artisan native:install android --force

      - name: Create signing credentials
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > /tmp/keystore.jks
            export ANDROID_KEYSTORE_FILE="/tmp/keystore.jks"
          fi

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG=${GITHUB_REF#refs/tags/v}
            echo "VERSION_NAME=${TAG}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.version_name }}" ]; then
            echo "VERSION_NAME=${{ github.event.inputs.version_name }}" >> $GITHUB_OUTPUT
          else
            TIMESTAMP=$(date +%Y%m%d%H%M)
            echo "VERSION_NAME=build-${TIMESTAMP}" >> $GITHUB_OUTPUT
          fi

      - name: Set version in .env
        run: |
          echo "NATIVEPHP_APP_VERSION=${{ steps.version.outputs.VERSION_NAME }}" >> .env

      - name: Build APK (Release)
        if: github.event.inputs.build_type == 'release' || github.event_name == 'workflow_dispatch'
        env:
          ANDROID_KEYSTORE_FILE: /tmp/keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p artifacts
          php artisan native:package android \
            --build-type=release \
            --output=./artifacts
          cp nativephp/android/app/build/outputs/apk/release/*.apk artifacts/ 2>/dev/null || true

      - name: Build AAB (Bundle)
        if: always() && (github.event.inputs.build_type == 'bundle' || github.event_name == 'push')
        env:
          ANDROID_KEYSTORE_FILE: /tmp/keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p artifacts
          php artisan native:package android \
            --build-type=bundle \
            --output=./artifacts
          cp nativephp/android/app/build/outputs/bundle/release/*.aab artifacts/ 2>/dev/null || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: hashFiles('artifacts/*.apk') != ''
        with:
          name: qat-erp-apk-${{ steps.version.outputs.VERSION_NAME }}
          path: artifacts/*.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        if: hashFiles('artifacts/*.aab') != ''
        with:
          name: qat-erp-aab-${{ steps.version.outputs.VERSION_NAME }}
          path: artifacts/*.aab
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          pattern: qat-erp-apk-*
          path: release-assets
          merge-multiple: true

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          pattern: qat-erp-aab-*
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Qat ERP ${{ github.ref_name }}
          body: |
            ## Qat ERP - Android App Release

            **Version:** ${{ github.ref_name }}
            **Date:** ${{ github.event.head_commit.timestamp }}

            ### Installation
            - **APK**: Download the APK file and install directly on your Android device.
            - **AAB**: For Google Play Store distribution.

            ### Requirements
            - Android 8.0 (API 26) or higher

            ### Changes
            See commit history for detailed changes.
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
